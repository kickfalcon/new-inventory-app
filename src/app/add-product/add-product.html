<div class="container">
    <div class="container text-center" style="margin: 30px">
        <h3>Add New Product</h3>
    </div>
    <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label for="description" class="form-label">Product description</label>
            <input type="text" class="form-control" id="description" require="true" [(ngModel)]="product.description" name="description"> <!-- [(ngModel)]="product.description" is used for two way data binding, the name is required -->
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Product price</label>
            <input type="number" step="any" class="form-control" id="price" [(ngModel)]="product.price" name="price">
            <!-- step="any" allows to input decimal numbers -->
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Product quantity</label>
            <input type="number" class="form-control" id="quantity" [(ngModel)]="product.quantity" name="quantity">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-warning btn-sm me-3">Add</button>
            <a href="/" class="btn  btn-danger btn-sm">Cancel</a>
        </div>
    </form>
</div>
